<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHERIA — Architectural Real Estate Platform</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        surface: {
                            ground: '#08090A',
                            base: '#0E1013',
                            elevated: '#16191E',
                            overlay: '#1F232B',
                        },
                        brand: {
                            bronze: '#C8A27C',
                            'bronze-hover': '#D4B28E',
                            gold: '#E5C07B',
                            obsidian: '#050607',
                        },
                        border: {
                            subtle: 'rgba(255, 255, 255, 0.08)',
                            prominent: 'rgba(200, 162, 124, 0.3)',
                        }
                    },
                    fontFamily: {
                        serif: ['Cinzel', 'Georgia', 'serif'],
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Core React Libraries -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel Browser Compiler -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Three.js Engine -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        body {
            background-color: #08090A;
            color: #F3F4F6;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
        }

        .glass-panel {
            background: rgba(22, 25, 30, 0.8);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .glass-panel-gold {
            background: rgba(22, 25, 30, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(200, 162, 124, 0.3);
        }

        .map-pin-pulse {
            box-shadow: 0 0 0 0 rgba(200, 162, 124, 0.7);
            animation: pulse-ring 2s infinite cubic-bezier(0.66, 0, 0, 1);
        }

        @keyframes pulse-ring {
            to { box-shadow: 0 0 0 12px rgba(200, 162, 124, 0); }
        }
    </style>
</head>
<body class="selection:bg-brand-bronze selection:text-black">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // Mock Seed Data
        const INITIAL_PROPERTIES = [
            {
                id: 'prop-1',
                title: 'The Obsidian Pavilion',
                location: 'Bel Air, Los Angeles, CA',
                city: 'Los Angeles',
                price: 18500000,
                listingType: 'buy',
                category: 'villa',
                bedrooms: 6,
                bathrooms: 8,
                sqft: 11200,
                primaryImage: 'https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?auto=format&fit=crop&w=1600&q=80',
                gallery: [
                    'https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?auto=format&fit=crop&w=1600&q=80',
                    'https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=1600&q=80',
                    'https://images.unsplash.com/photo-1600607687939-ce8a6c25118c?auto=format&fit=crop&w=1600&q=80'
                ],
                description: 'Perched atop Bel Air’s most coveted ridge, The Obsidian Pavilion represents contemporary architectural mastery with panoramic ocean views.',
                amenities: ['Infinity Edge Pool', 'Subterranean Garage', 'Wine Cellar', 'Smart Home Integration', 'Private Spa'],
                agent: {
                    name: 'Aurelia Sterling',
                    agency: 'Sterling & Co. International',
                    phone: '+1 (310) 892-4100',
                    email: 'aurelia@sterlingco.com',
                    image: 'https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?auto=format&fit=crop&w=400&q=80'
                }
            },
            {
                id: 'prop-2',
                title: 'Aetheria Sky Penthouse',
                location: 'Tribeca, New York, NY',
                city: 'New York',
                price: 24000000,
                listingType: 'buy',
                category: 'penthouse',
                bedrooms: 4,
                bathrooms: 5.5,
                sqft: 7800,
                primaryImage: 'https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=1600&q=80',
                gallery: [
                    'https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=1600&q=80',
                    'https://images.unsplash.com/photo-1600210492486-724fe5c67fb0?auto=format&fit=crop&w=1600&q=80'
                ],
                description: 'Spanning the top three floors of Tribeca’s premier landmark, offering private elevator access and a heated cantilevered terrace.',
                amenities: ['Private Rooftop Pool', 'Direct Elevator Access', '24/7 Doorman', 'Sauna'],
                agent: {
                    name: 'Julian Vance',
                    agency: 'Vance Real Estate Capital',
                    phone: '+1 (212) 555-0199',
                    email: 'julian@vancereal.com',
                    image: 'https://images.unsplash.com/photo-1560250097-0b93528c311a?auto=format&fit=crop&w=400&q=80'
                }
            },
            {
                id: 'prop-3',
                title: 'Villa Minimalist Brutalism',
                location: 'Paradise Valley, Phoenix, AZ',
                city: 'Phoenix',
                price: 45000,
                listingType: 'rent',
                category: 'villa',
                bedrooms: 5,
                bathrooms: 6,
                sqft: 9200,
                primaryImage: 'https://images.unsplash.com/photo-1600585154526-990dced4db0d?auto=format&fit=crop&w=1600&q=80',
                gallery: [
                    'https://images.unsplash.com/photo-1600585154526-990dced4db0d?auto=format&fit=crop&w=1600&q=80'
                ],
                description: 'A masterpiece of board-formed concrete and rusted steel integration designed to blend into the desert landscape.',
                amenities: ['Desert Garden', 'Lap Pool', 'Solar Integration', 'Security Vault'],
                agent: {
                    name: 'Aurelia Sterling',
                    agency: 'Sterling & Co. International',
                    phone: '+1 (310) 892-4100',
                    email: 'aurelia@sterlingco.com',
                    image: 'https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?auto=format&fit=crop&w=400&q=80'
                }
            }
        ];

        // Three.js 3D Viewer Component
        const ThreeDViewer = ({ title }) => {
            const containerRef = useRef(null);

            useEffect(() => {
                if (!containerRef.current) return;

                const scene = new THREE.Scene();
                scene.background = new THREE.Color(0x08090a);

                const camera = new THREE.PerspectiveCamera(45, containerRef.current.clientWidth / containerRef.current.clientHeight, 0.1, 1000);
                camera.position.set(8, 6, 10);

                const renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setSize(containerRef.current.clientWidth, containerRef.current.clientHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

                containerRef.current.appendChild(renderer.domElement);

                const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
                scene.add(ambientLight);

                const dirLight = new THREE.DirectionalLight(0xc8a27c, 1.2);
                dirLight.position.set(10, 20, 10);
                scene.add(dirLight);

                const houseGroup = new THREE.Group();

                // Base
                const baseGeo = new THREE.BoxGeometry(6, 0.4, 6);
                const baseMat = new THREE.MeshStandardMaterial({ color: 0x16191e });
                const baseMesh = new THREE.Mesh(baseGeo, baseMat);
                baseMesh.position.y = -0.2;
                houseGroup.add(baseMesh);

                // Main Section
                const mainGeo = new THREE.BoxGeometry(4.5, 2, 4);
                const mainMat = new THREE.MeshStandardMaterial({ color: 0xa8c0d0, transparent: true, opacity: 0.6 });
                const mainMesh = new THREE.Mesh(mainGeo, mainMat);
                mainMesh.position.y = 1;
                houseGroup.add(mainMesh);

                // Cantilever Upper Level
                const upperGeo = new THREE.BoxGeometry(5, 1.6, 4.5);
                const upperMat = new THREE.MeshStandardMaterial({ color: 0xc8a27c });
                const upperMesh = new THREE.Mesh(upperGeo, upperMat);
                upperMesh.position.set(0.5, 2.6, 0.2);
                houseGroup.add(upperMesh);

                scene.add(houseGroup);

                let animId;
                let angle = 0;
                const animate = () => {
                    animId = requestAnimationFrame(animate);
                    angle += 0.005;
                    camera.position.x = 10 * Math.cos(angle);
                    camera.position.z = 10 * Math.sin(angle);
                    camera.lookAt(0, 1.5, 0);
                    renderer.render(scene, camera);
                };
                animate();

                const handleResize = () => {
                    if (!containerRef.current) return;
                    camera.aspect = containerRef.current.clientWidth / containerRef.current.clientHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(containerRef.current.clientWidth, containerRef.current.clientHeight);
                };

                window.addEventListener('resize', handleResize);

                return () => {
                    cancelAnimationFrame(animId);
                    window.removeEventListener('resize', handleResize);
                    if (containerRef.current && renderer.domElement) {
                        containerRef.current.removeChild(renderer.domElement);
                    }
                };
            }, [title]);

            return (
                <div className="relative w-full h-[400px] lg:h-[500px] bg-surface-ground rounded-2xl overflow-hidden border border-border-subtle">
                    <div ref={containerRef} className="w-full h-full" />
                    <div className="absolute top-4 left-4 bg-black/70 backdrop-blur-md px-3 py-1.5 rounded-lg border border-white/10">
                        <span className="text-[10px] uppercase tracking-widest text-brand-bronze font-semibold block">3D Architectural Engine</span>
                        <span className="text-xs text-white">{title}</span>
                    </div>
                </div>
            );
        };

        // Main Application Component
        function App() {
            const [properties, setProperties] = useState(INITIAL_PROPERTIES);
            const [selectedProperty, setSelectedProperty] = useState(null);
            const [activeView, setActiveView] = useState('home'); // home | search | map | compare
            const [savedPropertyIds, setSavedPropertyIds] = useState(['prop-1']);
            const [comparePropertyIds, setComparePropertyIds] = useState([]);
            
            // Search Filters
            const [searchQuery, setSearchQuery] = useState('');
            const [listingType, setListingType] = useState('all');

            // Inquiry Modal
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [submitted, setSubmitted] = useState(false);

            const filteredProperties = useMemo(() => {
                return properties.filter(p => {
                    const matchesSearch = p.title.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                          p.location.toLowerCase().includes(searchQuery.toLowerCase());
                    const matchesType = listingType === 'all' || p.listingType === listingType;
                    return matchesSearch && matchesType;
                });
            }, [properties, searchQuery, listingType]);

            const toggleSave = (id, e) => {
                e.stopPropagation();
                setSavedPropertyIds(prev => prev.includes(id) ? prev.filter(item => item !== id) : [...prev, id]);
            };

            const toggleCompare = (id, e) => {
                e.stopPropagation();
                setComparePropertyIds(prev => prev.includes(id) ? prev.filter(item => item !== id) : [...prev, id]);
            };

            const handleSubmitInquiry = (e) => {
                e.preventDefault();
                setSubmitted(true);
                setTimeout(() => {
                    setSubmitted(false);
                    setIsModalOpen(false);
                }, 1800);
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header */}
                    <header className="sticky top-0 z-50 bg-surface-ground/90 backdrop-blur-xl border-b border-border-subtle px-6 lg:px-16 py-4 flex items-center justify-between">
                        <div onClick={() => { setActiveView('home'); setSelectedProperty(null); }} className="cursor-pointer flex items-center gap-3">
                            <div className="w-7 h-7 border border-brand-bronze rotate-45 flex items-center justify-center">
                                <div className="w-2 h-2 bg-brand-bronze" />
                            </div>
                            <span className="font-serif text-xl tracking-widest uppercase text-white">Aetheria</span>
                        </div>

                        <nav className="flex items-center gap-6 text-xs uppercase tracking-widest font-semibold text-gray-400">
                            <button onClick={() => { setActiveView('home'); setSelectedProperty(null); }} className={activeView === 'home' ? 'text-brand-bronze' : 'hover:text-white'}>Residences</button>
                            <button onClick={() => { setActiveView('search'); setSelectedProperty(null); }} className={activeView === 'search' ? 'text-brand-bronze' : 'hover:text-white'}>Discover</button>
                            <button onClick={() => { setActiveView('map'); setSelectedProperty(null); }} className={activeView === 'map' ? 'text-brand-bronze' : 'hover:text-white'}>Spatial Map</button>
                            <button onClick={() => { setActiveView('compare'); setSelectedProperty(null); }} className={activeView === 'compare' ? 'text-brand-bronze' : 'hover:text-white'}>
                                Compare ({comparePropertyIds.length})
                            </button>
                        </nav>

                        <button onClick={() => setIsModalOpen(true)} className="px-4 py-2 border border-brand-bronze text-brand-bronze hover:bg-brand-bronze hover:text-black transition-all rounded-full text-xs font-semibold uppercase tracking-widest">
                            Private Advisory
                        </button>
                    </header>

                    {/* Main Workspace */}
                    <main className="flex-1">
                        {/* VIEW: HOME */}
                        {activeView === 'home' && !selectedProperty && (
                            <div>
                                <section className="relative h-[80vh] flex flex-col justify-end px-6 lg:px-16 pb-16 overflow-hidden">
                                    <img src="https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?auto=format&fit=crop&w=2000&q=80" className="absolute inset-0 w-full h-full object-cover opacity-40" />
                                    <div className="relative z-10 max-w-3xl space-y-4">
                                        <span className="text-[10px] uppercase tracking-widest text-brand-bronze font-semibold">Architectural Living</span>
                                        <h1 className="font-serif text-5xl md:text-7xl text-white font-normal">Living as an <span className="italic text-brand-bronze">Art Form.</span></h1>
                                        
                                        <div className="glass-panel-gold p-3 rounded-2xl max-w-xl space-y-2">
                                            <div className="flex gap-2">
                                                <input 
                                                    type="text" 
                                                    placeholder="Search residence or city..." 
                                                    value={searchQuery}
                                                    onChange={e => setSearchQuery(e.target.value)}
                                                    className="flex-1 bg-surface-ground border border-border-subtle rounded-xl px-4 py-2 text-xs text-white outline-none focus:border-brand-bronze"
                                                />
                                                <button onClick={() => setActiveView('search')} className="px-6 py-2 bg-brand-bronze text-black font-semibold text-xs uppercase tracking-widest rounded-xl">
                                                    Explore
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </section>

                                <section className="px-6 lg:px-16 py-16 max-w-7xl mx-auto space-y-8">
                                    <h2 className="font-serif text-3xl text-white">Curated Collection</h2>
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                        {properties.map(p => (
                                            <div key={p.id} onClick={() => setSelectedProperty(p)} className="bg-surface-base border border-border-subtle rounded-2xl overflow-hidden cursor-pointer hover:border-brand-bronze transition-all">
                                                <img src={p.primaryImage} className="w-full h-56 object-cover" />
                                                <div className="p-6 space-y-2">
                                                    <span className="text-[10px] uppercase tracking-widest text-brand-bronze">{p.category}</span>
                                                    <h3 className="font-serif text-lg text-white">{p.title}</h3>
                                                    <p className="text-xs text-gray-400">{p.location}</p>
                                                    <p className="text-lg font-serif text-brand-bronze pt-2">${p.price.toLocaleString()}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </section>
                            </div>
                        )}

                        {/* VIEW: SEARCH EXPLORER */}
                        {activeView === 'search' && !selectedProperty && (
                            <section className="px-6 lg:px-16 py-10 max-w-7xl mx-auto space-y-8">
                                <h2 className="font-serif text-3xl text-white">Catalog Explorer</h2>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                    {filteredProperties.map(p => (
                                        <div key={p.id} onClick={() => setSelectedProperty(p)} className="bg-surface-base border border-border-subtle rounded-2xl overflow-hidden cursor-pointer hover:border-brand-bronze transition-all">
                                            <img src={p.primaryImage} className="w-full h-56 object-cover" />
                                            <div className="p-6 space-y-3">
                                                <h3 className="font-serif text-lg text-white">{p.title}</h3>
                                                <p className="text-xs text-gray-400">{p.location}</p>
                                                <div className="flex justify-between items-center pt-2 border-t border-border-subtle">
                                                    <span className="font-serif text-brand-bronze">${p.price.toLocaleString()}</span>
                                                    <button onClick={(e) => toggleCompare(p.id, e)} className="text-[10px] uppercase tracking-widest text-gray-300 hover:text-brand-bronze">
                                                        {comparePropertyIds.includes(p.id) ? 'Comparing' : '+ Compare'}
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        )}

                        {/* VIEW: SPATIAL MAP */}
                        {activeView === 'map' && !selectedProperty && (
                            <section className="px-6 lg:px-16 py-10 max-w-7xl mx-auto space-y-6">
                                <h2 className="font-serif text-3xl text-white">Geospatial Explorer</h2>
                                <div className="h-[500px] bg-surface-base rounded-2xl border border-border-subtle relative flex items-center justify-center p-8">
                                    <div className="absolute inset-0 opacity-10 bg-[radial-gradient(#c8a27c_1px,transparent_1px)] [background-size:16px_16px]" />
                                    {properties.map((p, idx) => (
                                        <div 
                                            key={p.id} 
                                            onClick={() => setSelectedProperty(p)} 
                                            className="absolute cursor-pointer map-pin-pulse px-3 py-1.5 bg-black border border-brand-bronze text-brand-bronze text-xs font-bold rounded-lg"
                                            style={{ top: `${35 + idx * 20}%`, left: `${30 + idx * 25}%` }}
                                        >
                                            ${(p.price / 1000000).toFixed(1)}M
                                        </div>
                                    ))}
                                </div>
                            </section>
                        )}

                        {/* VIEW: COMPARE */}
                        {activeView === 'compare' && !selectedProperty && (
                            <section className="px-6 lg:px-16 py-10 max-w-7xl mx-auto space-y-6">
                                <h2 className="font-serif text-3xl text-white">Property Comparison</h2>
                                {comparePropertyIds.length === 0 ? (
                                    <p className="text-gray-400 text-sm">No residences selected for comparison.</p>
                                ) : (
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                        {comparePropertyIds.map(id => {
                                            const p = properties.find(item => item.id === id);
                                            return (
                                                <div key={id} className="p-6 bg-surface-base border border-border-subtle rounded-2xl space-y-3">
                                                    <img src={p.primaryImage} className="w-full h-40 object-cover rounded-xl" />
                                                    <h3 className="font-serif text-lg text-white">{p.title}</h3>
                                                    <p className="text-xs text-brand-bronze font-serif">${p.price.toLocaleString()}</p>
                                                    <p className="text-xs text-gray-400">{p.bedrooms} Beds • {p.bathrooms} Baths • {p.sqft.toLocaleString()} sqft</p>
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}
                            </section>
                        )}

                        {/* VIEW: PROPERTY DETAIL */}
                        {selectedProperty && (
                            <section className="px-6 lg:px-16 py-10 max-w-7xl mx-auto space-y-10">
                                <button onClick={() => setSelectedProperty(null)} className="text-xs uppercase tracking-widest text-brand-bronze font-semibold">
                                    &larr; Return to Explorer
                                </button>

                                <div className="flex flex-col md:flex-row justify-between items-start md:items-end gap-4 border-b border-border-subtle pb-6">
                                    <div>
                                        <span className="text-[10px] uppercase tracking-widest text-brand-bronze font-semibold">{selectedProperty.category}</span>
                                        <h1 className="font-serif text-4xl text-white">{selectedProperty.title}</h1>
                                        <p className="text-xs text-gray-400 mt-1">{selectedProperty.location}</p>
                                    </div>
                                    <div className="text-left md:text-right">
                                        <span className="font-serif text-3xl text-brand-bronze block">${selectedProperty.price.toLocaleString()}</span>
                                    </div>
                                </div>

                                <ThreeDViewer title={selectedProperty.title} />

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    {selectedProperty.gallery.map((img, i) => (
                                        <img key={i} src={img} className="w-full h-72 object-cover rounded-2xl border border-border-subtle" />
                                    ))}
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                    <div className="lg:col-span-2 space-y-6">
                                        <h3 className="font-serif text-2xl text-white">Residence Description</h3>
                                        <p className="text-sm text-gray-300 leading-relaxed">{selectedProperty.description}</p>
                                    </div>

                                    <div className="glass-panel p-6 rounded-2xl space-y-4 h-fit">
                                        <h4 className="font-serif text-lg text-white">Listing Advisory</h4>
                                        <p className="text-xs text-gray-300">{selectedProperty.agent.name} — {selectedProperty.agent.agency}</p>
                                        <p className="text-xs font-mono text-gray-400">{selectedProperty.agent.phone}</p>
                                        <button onClick={() => setIsModalOpen(true)} className="w-full py-3 bg-brand-bronze text-black text-xs font-semibold uppercase tracking-widest rounded-xl">
                                            Request Viewing
                                        </button>
                                    </div>
                                </div>
                            </section>
                        )}
                    </main>

                    {/* Modal */}
                    {isModalOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-md">
                            <div className="glass-panel-gold p-8 rounded-2xl max-w-md w-full space-y-4 relative">
                                <button onClick={() => setIsModalOpen(false)} className="absolute top-4 right-4 text-gray-400 hover:text-white">✕</button>
                                {submitted ? (
                                    <div className="text-center py-6">
                                        <h3 className="font-serif text-xl text-white">Inquiry Registered</h3>
                                        <p className="text-xs text-gray-400 mt-2">A representative will contact you shortly.</p>
                                    </div>
                                ) : (
                                    <form onSubmit={handleSubmitInquiry} className="space-y-4">
                                        <h3 className="font-serif text-xl text-white">Private Tour Request</h3>
                                        <input required type="text" placeholder="Full Name" className="w-full bg-surface-ground border border-border-subtle rounded-xl p-3 text-xs text-white outline-none focus:border-brand-bronze" />
                                        <input required type="email" placeholder="Email Address" className="w-full bg-surface-ground border border-border-subtle rounded-xl p-3 text-xs text-white outline-none focus:border-brand-bronze" />
                                        <button type="submit" className="w-full py-3 bg-brand-bronze text-black rounded-xl text-xs font-semibold uppercase tracking-widest">
                                            Submit Request
                                        </button>
                                    </form>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
