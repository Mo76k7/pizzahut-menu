        // --- THREE.JS INTERACTIVE 3D VIEWER COMPONENT ---
        const ThreeDViewer = ({ propertyTitle }) => {
            const containerRef = useRef(null);
            const [isLoaded, setIsLoaded] = useState(false);

            useEffect(() => {
                if (!containerRef.current) return;

                // 1. Scene Setup
                const scene = new THREE.Scene();
                scene.background = new THREE.Color(0x08090a);

                // 2. Camera Setup
                const camera = new THREE.PerspectiveCamera(
                    45, 
                    containerRef.current.clientWidth / containerRef.current.clientHeight, 
                    0.1, 
                    1000
                );
                camera.position.set(8, 6, 10);

                // 3. Renderer Setup
                const renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setSize(containerRef.current.clientWidth, containerRef.current.clientHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                renderer.shadowMap.enabled = true;

                containerRef.current.appendChild(renderer.domElement);

                // 4. Lighting Engine
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
                scene.add(ambientLight);

                const dirLight = new THREE.DirectionalLight(0xc8a27c, 1.2);
                dirLight.position.set(10, 20, 10);
                dirLight.castShadow = true;
                scene.add(dirLight);

                const fillLight = new THREE.DirectionalLight(0x3b82f6, 0.4);
                fillLight.position.set(-10, 10, -10);
                scene.add(fillLight);

                // 5. Procedural Architectural Building Geometry
                const houseGroup = new THREE.Group();

                // Base Podium
                const baseGeo = new THREE.BoxGeometry(6, 0.4, 6);
                const baseMat = new THREE.MeshStandardMaterial({ color: 0x16191e, roughness: 0.8 });
                const baseMesh = new THREE.Mesh(baseGeo, baseMat);
                baseMesh.position.y = -0.2;
                houseGroup.add(baseMesh);

                // Main Floor Glass Structure
                const mainGeo = new THREE.BoxGeometry(4.5, 2, 4);
                const mainMat = new THREE.MeshPhysicalMaterial({
                    color: 0xa8c0d0,
                    transparent: true,
                    opacity: 0.4,
                    roughness: 0.1,
                    transmission: 0.8
                });
                const mainMesh = new THREE.Mesh(mainGeo, mainMat);
                mainMesh.position.y = 1;
                houseGroup.add(mainMesh);

                // Cantilevered Upper Structure
                const upperGeo = new THREE.BoxGeometry(5, 1.6, 4.5);
                const upperMat = new THREE.MeshStandardMaterial({ color: 0xc8a27c, roughness: 0.3, metalness: 0.2 });
                const upperMesh = new THREE.Mesh(upperGeo, upperMat);
                upperMesh.position.set(0.5, 2.6, 0.2);
                houseGroup.add(upperMesh);

                // Architectural Core Support Column
                const coreGeo = new THREE.BoxGeometry(1.2, 4, 1.2);
                const coreMat = new THREE.MeshStandardMaterial({ color: 0x222630 });
                const coreMesh = new THREE.Mesh(coreGeo, coreMat);
                coreMesh.position.set(-1.8, 2, -1);
                houseGroup.add(coreMesh);

                scene.add(houseGroup);

                // 6. Camera Animation Loop
                let animationFrameId;
                let angle = 0;

                const animate = () => {
                    animationFrameId = requestAnimationFrame(animate);
                    
                    // Slow ambient orbit rotation
                    angle += 0.005;
                    camera.position.x = 10 * Math.cos(angle);
                    camera.position.z = 10 * Math.sin(angle);
                    camera.lookAt(0, 1.5, 0);

                    renderer.render(scene, camera);
                };

                animate();
                setIsLoaded(true);

                // Handle Window Resize
                const handleResize = () => {
                    if (!containerRef.current) return;
                    camera.aspect = containerRef.current.clientWidth / containerRef.current.clientHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(containerRef.current.clientWidth, containerRef.current.clientHeight);
                };

                window.addEventListener('resize', handleResize);

                return () => {
                    cancelAnimationFrame(animationFrameId);
                    window.removeEventListener('resize', handleResize);
                    if (containerRef.current && renderer.domElement) {
                        containerRef.current.removeChild(renderer.domElement);
                    }
                };
            }, [propertyTitle]);

            return (
                <div className="relative w-full h-[450px] lg:h-[600px] bg-surface-ground rounded-2xl overflow-hidden border border-border-subtle">

                                ) : (
                                    <form onSubmit={handleInquirySubmit} className="space-y-4">
                                        <div>
                                            <span className="text-[10px] uppercase tracking-widest text-brand-bronze font-semibold">Private Advisory</span>
                                            <h3 className="font-serif text-2xl text-white">Schedule Viewing</h3>
                                        </div>

                                        <div>
                                            <label className="block text-[10px] uppercase tracking-widest text-gray-400 mb-1">Full Name</label>
                                            <input 
                                                required 
                                                type="text" 
                                                value={inquiryForm.name}
                                                onChange={e => setInquiryForm({...inquiryForm, name: e.target.value})}
                                                className="w-full bg-surface-ground border border-border-subtle rounded-xl p-3 text-xs text-white outline-none focus:border-brand-bronze" 
                                            />
                                        </div>

                                        <div>
                                            <label className="block text-[10px] uppercase tracking-widest text-gray-400 mb-1">Email Address</label>
                                            <input 
                                                required 
                                                type="email" 
                                                value={inquiryForm.email}
                                                onChange={e => setInquiryForm({...inquiryForm, email: e.target.value})}
                                                className="w-full bg-surface-ground border border-border-subtle rounded-xl p-3 text-xs text-white outline-none focus:border-brand-bronze" 
                                            />
                                        </div>

                                        <div>
                                            <label className="block text-[10px] uppercase tracking-widest text-gray-400 mb-1">Phone Number</label>
                                            <input 
                                                required 
                                                type="tel" 
                                                value={inquiryForm.phone}
                                                onChange={e => setInquiryForm({...inquiryForm, phone: e.target.value})}
                                                className="w-full bg-surface-ground border border-border-subtle rounded-xl p-3 text-xs text-white outline-none focus:border-brand-bronze" 
                                            />
                                        </div>

                                        <div>
                                            <label className="block text-[10px] uppercase tracking-widest text-gray-400 mb-1">Message / Requirements</label>
                                            <textarea 
                                                rows="3"
                                                value={inquiryForm.message}
                                                onChange={e => setInquiryForm({...inquiryForm, message: e.target.value})}
                                                className="w-full bg-surface-ground border border-border-subtle rounded-xl p-3 text-xs text-white outline-none focus:border-brand-bronze"
                                            ></textarea>
                                        </div>

                                        <button 
                                            type="submit"
                                            className="w-full py-3 bg-brand-bronze hover:bg-brand-bronze-hover text-black rounded-xl text-xs uppercase tracking-widest font-semibold transition-all"
                                        >
                                            Submit Inquiry
                                        </button>
                                    </form>
                                )}
                            </div>
                        </div>
                    )}

                    <!-- FOOTER SYSTEM -->
                    <footer className="border-t border-border-subtle bg-surface-base px-6 lg:px-16 py-12 text-xs text-gray-500 mt-20">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
                            <div className="flex items-center gap-3">
                                <div className="w-6 h-6 border border-brand-bronze flex items-center justify-center rotate-45">
                                    <div className="w-1.5 h-1.5 bg-brand-bronze" />
                                </div>
                                <span className="font-serif text-lg tracking-widest uppercase font-light text-white">Aetheria Platform</span>
                            </div>
                            <p className="font-mono text-[11px]">© 2026 AETHERIA PLATFORM INC. ALL ARCHITECTURAL DESIGNS PROTECTED.</p>
                        </div>
                    </footer>
                </div>
            );
        }

        // Render React Tree to Canvas
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AetheriaApp />);
    </script>
</body>
</html>
