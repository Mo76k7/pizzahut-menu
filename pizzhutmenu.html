<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza Hut Addis Ababa — Interactive Menu</title>
    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --color-primary: #EE1945;       /* Pizza Hut Red */
            --color-primary-dark: #B80F32;
            --color-accent: #FFAA00;        /* Cheese Gold */
            --color-bg: #111111;            /* Deep Charcoal Black */
            --color-card: #1A1A1A;          /* Light Charcoal Card Body */
            --color-text-main: #FFFFFF;     /* White Text */
            --color-text-muted: #AAAAAA;    /* Balanced Muted Grey */
            --font-display: 'Barlow Condensed', sans-serif;
            --font-sans: 'Inter', sans-serif;
            --shadow-md: 0 8px 30px rgba(0,0,0,0.5);
            --radius-lg: 20px;
            --radius-md: 14px;
            --radius-sm: 8px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #080808;
            font-family: var(--font-sans);
            color: var(--color-text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Phone frame layout */
        .phone-wrapper {
            width: 100%;
            max-width: 412px;
            height: 892px;
            background-color: var(--color-bg);
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border-radius: 40px;
            border: 8px solid #222;
            display: flex;
            flex-direction: column;
        }

        /* Top global navigation bar */
        .app-header {
            padding: 20px 20px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--color-bg);
            z-index: 10;
            border-bottom: 1px solid #222;
        }
        .header-left .location-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--color-text-muted);
        }
        .header-left .location-value {
            font-size: 14px;
            font-weight: 700;
            color: var(--color-primary);
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 2px;
        }
        .brand-logo {
            height: 32px;
            object-fit: contain;
        }

        /* Core scrollable frame wrapper */
        .view-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px 20px 90px;
            scrollbar-width: none;
        }
        .view-container::-webkit-scrollbar {
            display: none;
        }
        
        .app-view {
            display: none;
            animation: fadeIn 0.3s ease-out forwards;
        }
        .app-view.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .display-title {
            font-family: var(--font-display);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--color-text-main);
        }
        .section-header {
            margin: 20px 0 12px;
        }
        .section-header h2 {
            font-size: 20px;
            font-family: var(--font-display);
            text-transform: uppercase;
            color: var(--color-accent);
            letter-spacing: 0.5px;
        }

        /* Horizontal Category Navigation Bar */
        .category-scroll {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 6px 0;
            scrollbar-width: none;
            margin-top: 12px;
            position: sticky;
            top: 0;
            background: var(--color-bg);
            z-index: 5;
        }
        .category-scroll::-webkit-scrollbar { display: none; }
        .cat-pill {
            background: var(--color-card);
            padding: 10px 16px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--color-text-muted);
            border: 1px solid #222;
        }
        .cat-pill.active {
            background: var(--color-primary);
            color: #FFF;
            border-color: var(--color-primary);
        }

        /* Dynamic Product Grid Component */
        .product-grid {
            display: grid;
            grid-template-cols: 1fr 1fr;
            gap: 12px;
            margin-top: 8px;
        }
        .product-card {
            background: var(--color-card);
            border-radius: var(--radius-md);
            overflow: hidden;
            border: 1px solid #222;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
        }
        .product-card:active {
            transform: scale(0.98);
        }
        .product-card img {
            width: 100%;
            height: 110px;
            object-fit: cover;
        }
        .product-info {
            padding: 10px;
            display: flex;
            flex-direction: column;
            flex: 1;
            justify-content: space-between;
        }
        .product-info h4 {
            font-size: 13px;
            font-weight: 700;
            color: #FFF;
            margin-bottom: 4px;
            line-height: 1.2;
        }
        .product-info p {
            font-size: 11px;
            color: var(--color-text-muted);
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.3;
        }
        .product-price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
        }
        .product-price {
            font-size: 13px;
            font-weight: 800;
            color: var(--color-accent);
        }
        .add-icon-btn {
            color: var(--color-primary);
            font-size: 18px;
        }

        /* Dynamic Customization Overlay Modal Box */
        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 200;
            display: none;
            align-items: flex-end;
        }
        .modal-sheet {
            width: 100%;
            background: #161616;
            border-top-left-radius: var(--radius-lg);
            border-top-right-radius: var(--radius-lg);
            padding: 24px;
            max-height: 85%;
            overflow-y: auto;
            animation: slideUp 0.3s ease-out forwards;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .modal-close-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .modal-close-btn {
            background: #222;
            border: none;
            color: #FFF;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
        }
        .modal-img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: var(--radius-md);
            margin-bottom: 14px;
        }
        .modal-desc {
            font-size: 12px;
            color: var(--color-text-muted);
            line-height: 1.4;
            margin-bottom: 16px;
        }
        .options-group {
            margin-bottom: 16px;
        }
        .options-group-title {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--color-accent);
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }
        .selector-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }
        .selector-btn {
            flex: 1;
            background: #222;
            border: 1px solid #333;
            color: #FFF;
            padding: 10px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 11px;
            font-weight: 700;
            text-align: center;
            text-transform: uppercase;
        }
        .selector-btn.active {
            background: var(--color-primary);
            border-color: var(--color-primary);
        }
        .checkbox-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #222;
            padding: 12px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            margin-bottom: 6px;
        }

        /* Action Buttons */
        .btn-primary {
            background: var(--color-primary);
            color: #FFF;
            border: none;
            border-radius: var(--radius-sm);
            padding: 16px;
            width: 100%;
            font-family: var(--font-sans);
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 16px;
        }
        .btn-primary:hover { background: var(--color-primary-dark); }

        /* Bottom Application Context Navigator Bar */
        .bottom-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #111111;
            border-top: 1px solid #222;
            display: flex;
            justify-content: space-around;
            padding: 12px 10px 24px;
            z-index: 100;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--color-text-muted);
            text-decoration: none;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            gap: 4px;
            cursor: pointer;
            position: relative;
        }
        .nav-item i { font-size: 18px; }
        .nav-item.active { color: var(--color-primary); }
        .badge {
            position: absolute;
            top: -4px;
            right: -6px;
            background: var(--color-accent);
            color: #000;
            font-size: 9px;
            padding: 2px 5px;
            border-radius: 10px;
            font-weight: 800;
        }

        /* Cart Views Markup Elements */
        .cart-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--color-card);
            padding: 10px;
            border-radius: var(--radius-md);
            margin-bottom: 10px;
            border: 1px solid #222;
        }
        .cart-item img { width: 50px; height: 50px; object-fit: cover; border-radius: var(--radius-sm); }
        .cart-item-info { flex: 1; }
        .cart-item-title { font-size: 13px; font-weight: 700; }
        .cart-item-meta { font-size: 11px; color: var(--color-text-muted); margin-top: 2px; }
        .cart-item-price { font-size: 13px; color: var(--color-accent); font-weight: 800; margin-top: 2px; }
        .qty-selector {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #222;
            padding: 4px 8px;
            border-radius: 20px;
        }
        .qty-btn {
            background: transparent;
            border: none;
            color: #FFF;
            font-size: 14px;
            cursor: pointer;
            font-weight: 700;
        }
        .summary-block {
            background: var(--color-card);
            border-radius: var(--radius-md);
            padding: 14px;
            margin-top: 20px;
            border: 1px solid #222;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 8px;
            color: var(--color-text-muted);
        }
        .summary-row.total {
            border-top: 1px solid #333;
            padding-top: 10px;
            font-weight: 800;
            color: #FFF;
            font-size: 15px;
        }
    </style>
</head>
<body>

    <div class="phone-wrapper">
        <!-- Header -->
        <header class="app-header">
            <div class="header-left">
                <p class="location-label">Addis Ababa Branch</p>
                <div class="location-value">
                    <i class="fa-solid fa-location-dot"></i> 
                    <select id="branch-select" style="background:transparent; border:none; color:inherit; font-weight:inherit; font-size:inherit; outline:none; cursor:pointer;">
                        <option value="Bole Road" style="background:#111;">Bole Road</option>
                        <option value="Bethel Square" style="background:#111;">Bethel Square</option>
                        <option value="CMC" style="background:#111;">CMC Branch</option>
                        <option value="Ayat Zone 8" style="background:#111;">Ayat Zone 8</option>
                    </select>
                </div>
            </div>
            <!-- Standard Placeholder Logo Representation -->
            <div style="font-family: var(--font-display); font-weight:900; color:var(--color-primary); font-size:20px; tracking: -1px;">PIZZA HUT</div>
        </header>

        <!-- Viewport container -->
        <main class="view-container" id="view-viewport">
            
            <!-- VIEW 1: DYNAMIC CATEGORIES & PRODUCTS HUB -->
            <div id="view-home" class="app-view active">
                <h1 class="display-title" style="font-size: 26px; margin-top: 8px; color: #FFF;">Now Delivering <br><span style="color:var(--color-primary)">Your Favorites</span></h1>
                
                <!-- Horizontal Category Navigation deck bar -->
                <div class="category-scroll" id="categories-bar">
                    <!-- Loaded dynamically via scripts -->
                </div>

                <div class="section-header">
                    <h2 id="current-category-title">Veg Pizza</h2>
                </div>

                <!-- Products list context target frame -->
                <div class="product-grid" id="products-target-grid">
                    <!-- Dynamic rendering target hook -->
                </div>
            </div>

            <!-- VIEW 2: CART VIEW SYSTEM -->
            <div id="view-cart" class="app-view">
                <h1 class="display-title" style="font-size: 24px; margin-bottom: 16px; border-bottom:1px solid #222; padding-bottom:8px;">Your Tray</h1>
                <div id="cart-items-root"></div>

                <div class="summary-block">
                    <div class="summary-row"><span>Subtotal</span><span id="summary-subtotal">Br 0.00</span></div>
                    <div class="summary-row"><span>Service Charge</span><span id="summary-delivery">Br 100.00</span></div>
                    <div class="summary-row total"><span>Total Order Amount</span><span id="summary-total">Br 100.00</span></div>
                </div>

                <button class="btn-primary" onclick="submitOrderToTelegram()">
                    <i class="fa-brands fa-telegram"></i> Send Order Via Telegram
                </button>
            </div>

        </main>

        <!-- Context Item Detail Customization Overlay Modal Shell -->
        <div class="modal-overlay" id="product-modal">
            <div class="modal-sheet">
                <div class="modal-close-header">
                    <h3 class="display-title" id="modal-item-name" style="font-size: 20px;">Item Title</h3>
                    <button class="modal-close-btn" onclick="closeProductModal()"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <img src="" id="modal-item-img" class="modal-img" alt="Product Showcase">
                <p id="modal-item-desc" class="modal-desc">Product detailed recipe layout.</p>
                
                <div id="pizza-options-container">
                    <!-- Dynamic rendering sizing matrix options elements -->
                </div>

                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:20px; border-top: 1px solid #222; padding-top:16px;">
                    <div class="qty-selector">
                        <button class="qty-btn" onclick="mutateModalQuantity(-1)">-</button>
                        <span id="modal-qty-display" style="font-weight:700; font-size:14px; min-width:14px; text-align:center;">1</span>
                        <button class="qty-btn" onclick="mutateModalQuantity(1)">+</button>
                    </div>
                    <button class="btn-primary" style="margin:0; width:auto; flex:1; margin-left:16px;" onclick="addModalItemToCart()">
                        Add — Br <span id="modal-total-price-display">0</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Global Navigation Deck Layout components -->
        <nav class="bottom-nav">
            <div class="nav-item active" id="nav-home" onclick="navigateTo('home')">
                <i class="fa-solid fa-pizza-slice"></i>
                <span>Menu</span>
            </div>
            <div class="nav-item" id="nav-cart" onclick="navigateTo('cart')">
                <i class="fa-solid fa-basket-shopping"></i>
                <span>Tray</span>
                <span class="badge" id="cart-badge-count" style="display:none;">0</span>
            </div>
        </nav>
    </div>

                    { id: "f2", name: "VEGGIE BLAST", desc: "Fasting Sauce, Pineapple, Onion, Olives & Green Chilli, Capsicum, Mushroom & Green Chilli", prices: { small: 480, medium: 795, large: 1100 }, img: "https://images.unsplash.com/photo-1628840042765-356cda07504e?auto=format&fit=crop&w=400&q=80", type: "pizza" },
                    { id: "f3", name: "PINEAPPLE LOVERS", desc: "Fasting Sauce, Pineapple, Fasting Sauce, Pineapple, Onion & Green Chilli", prices: { small: 520, medium: 740, large: 1100 }, img: "https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?auto=format&fit=crop&w=400&q=80", type: "pizza" }
                ]
            },
            "sides": {
                title: "Sides",
                items: [
                    { id: "s1", name: "FRENCH FRIES", desc: "Golden standard crisps", price: 355, img: "https://images.unsplash.com/photo-1573080496219-bb080dd4f877?auto=format&fit=crop&w=400&q=80", type: "flat" },
                    { id: "s2", name: "CHILLI FRIES", desc: "French fries tossed in spice blend", price: 450, img: "https://images.unsplash.com/photo-1585109649139-366815a0d713?auto=format&fit=crop&w=400&q=80", type: "flat" },
                    { id: "s3", name: "CHEESY FRIES", desc: "Fries layered with rich melted cheese", price: 425, img: "https://images.unsplash.com/photo-1534939561126-855b8675edd7?auto=format&fit=crop&w=400&q=80", type: "flat" },
                    { id: "s4", name: "3 BONE-OUT WINGS", desc: "Tender bone-out chicken bites", price: 700, img: "https://images.unsplash.com/photo-1567620832903-9fc6debc209f?auto=format&fit=crop&w=400&q=80", type: "flat" },
                    { id: "s5", name: "6 BONE-OUT WINGS", desc: "Larger sharing wings bundle pack", price: 1300, img: "https://images.unsplash.com/photo-1567620832903-9fc6debc209f?auto=format&fit=crop&w=400&q=80", type: "flat" },
                    { id: "s6", name: "PLAIN GARLIC BREAD", desc: "Hand-stretched toasted baseline bread", price: 295, img: "https://images.unsplash.com/photo-1573140247632-f8fd74997d5c?auto=format&fit=crop&w=400&q=80", type: "flat" }
                ]
            },
            "extra-toppings": {
                title: "Extra Toppings",
                items: [
                    { id: "t1", name: "CHEESE ADD-ON", desc: "Extra baseline mozzarella spread layer", prices: { small: 155, medium: 225, large: 405 }, img: "https://images.unsplash.com/photo-1586444248902-2f64eddc13df?auto=format&fit=crop&w=400&q=80", type: "pizza" },
                    { id: "t2", name: "OLIVE TOPPING", desc: "Sliced black olives", prices: { small: 95, medium: 125, large: 170 }, img: "https://images.unsplash.com/photo-1541532713592-79a0317b6b77?auto=format&fit=crop&w=400&q=80", type: "pizza" },
                    { id: "t3", name: "CHICKEN CHUNKS", desc: "Extra roasted chicken portions", prices: { small: 150, medium: 225, large: 325 }, img: "https://images.unsplash.com/photo-1604503468506-a8da13d82791?auto=format&fit=crop&w=400&q=80", type: "pizza" }
                ]
            },
            "drinks": {
                title: "Drinks",
                items: [
                    { id: "d1", name: "COCA-COLA", desc: "Refreshing soft drink choice", prices: { small: 100, medium: 140, large: 140 }, img: "https://images.unsplash.com/photo-1622483767028-3f66f32aef97?auto=format&fit=crop&w=400&q=80", type: "pizza", sizeLabels: ["300ml", "500ml", "1L"] },
                    { id: "d2", name: "SPRITE", desc: "Crisp lemon-lime splash flavor", prices: { small: 100, medium: 140, large: 140 }, img: "https://images.unsplash.com/photo-1625772290748-160b63487b1c?auto=format&fit=crop&w=400&q=80", type: "pizza", sizeLabels: ["300ml", "500ml", "1L"] },
                    { id: "d3", name: "AMBO SPARKLING WATER", desc: "Local natural Ethiopian sparkling mineral water", price: 100, img: "https://images.unsplash.com/photo-1608885898957-a599fb1698d6?auto=format&fit=crop&w=400&q=80", type: "flat" }
                ]
            },
            "cold-stone": {
                title: "Cold Stone Creamery",
                items: [
                    { id: "cs1", name: "FOUNDING FATHERS SUNDAE", desc: "Rich sweet cream ice cream with fudge brownies and caramel layers", price: 450, img: "https://images.unsplash.com/photo-1563805042-7684c019e1cb?auto=format&fit=crop&w=400&q=80", type: "flat" },
                    { id: "cs2", name: "CHOCOLATE DEVOTION", desc: "Chocolate ice cream with fudge chips, brownie chunks", price: 480, img: "https://images.unsplash.com/photo-1505394033641-42c6c2950db0?auto=format&fit=crop&w=400&q=80", type: "flat" },
                    { id: "cs3", name: "COTTON CANDY CARNIVAL", desc: "Vibrant custom cotton candy base style scoop", price: 420, img: "https://images.unsplash.com/photo-1474979266404-7eaacbcd87c5?auto=format&fit=crop&w=400&q=80", type: "flat" }
                ]
            }
        };

        // Core Application Management State Matrix Array
        const APP_STATE = {
            cart: [],
            currentCategory: "veg-pizza",
            modalCurrentItem: null,
            modalSelectedSize: "medium",
            modalSelectedCrust: "Original Pan",
            modalQuantity: 1
        };

        // Window Lifecycle Initializer hooks
        window.addEventListener('DOMContentLoaded', () => {
            renderCategoryNavigationDeck();
            renderActiveCategoryProducts();
        });

        function navigateTo(viewId) {
            document.querySelectorAll('.app-view').forEach(view => view.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
            
            const targetView = document.getElementById(`view-${viewId}`);
            if(targetView) targetView.classList.add('active');
            
            const targetNav = document.getElementById(`nav-${viewId}`);
            if(targetNav) targetNav.classList.add('active');

            if(viewId === 'cart') renderCartUI();
        }

        // Render upper Horizontal Dynamic pills list navigation deck
        function renderCategoryNavigationDeck() {
            const container = document.getElementById('categories-bar');
            let html = '';
            Object.keys(MENU_DATA).forEach((key, index) => {
                const isActive = key === APP_STATE.currentCategory ? 'active' : '';
                html += `
                    <div class="cat-pill ${isActive}" onclick="handleCategorySwitch('${key}')">
                        <i class="fa-solid ${getCategoryIcon(key)}"></i> ${MENU_DATA[key].title}
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function getCategoryIcon(key) {
            switch(key) {
                case 'veg-pizza': return 'fa-seedling';
                case 'meat-pizza': return 'fa-bacon';
                case 'chicken-pizza': return 'fa-drumstick-bite';
                case 'fasting-pizza': return 'fa-fish';
                case 'sides': return 'fa-bowl-rice';
                case 'extra-toppings': return 'fa-plus';
                case 'drinks': return 'fa-bottle-water';
                case 'cold-stone': return 'fa-ice-cream';
                default: return 'fa-pizza-slice';
            }
        }

        function handleCategorySwitch(categoryKey) {
            APP_STATE.currentCategory = categoryKey;
            renderCategoryNavigationDeck();
            renderActiveCategoryProducts();
            document.getElementById('current-category-title').innerText = MENU_DATA[categoryKey].title;
        }

        // Build grid view arrays list output target elements
        function renderActiveCategoryProducts() {
            const targetGrid = document.getElementById('products-target-grid');
            const items = MENU_DATA[APP_STATE.currentCategory].items;
            let html = '';

            items.forEach(item => {
                const displayPrice = item.type === 'pizza' ? `From Br ${item.prices.small}` : `Br ${item.price}`;
                html += `
                    <div class="product-card" onclick="openProductModal('${item.id}')">
                        <img src="${item.img}" alt="${item.name}">
                        <div class="product-info">
                            <h4>${item.name}</h4>
                            <p>${item.desc}</p>
                            <div class="product-price-row">
                                <span class="product-price">${displayPrice}</span>
                                <i class="fa-solid fa-circle-plus add-icon-btn"></i>
                            </div>
                        </div>
                    </div>
                `;
            });
            targetGrid.innerHTML = html;
        }

        // Customization Overlay Context Modal Mechanics Engines logic
        function openProductModal(itemId) {
            const item = MENU_DATA[APP_STATE.currentCategory].items.find(i => i.id === itemId);
            if(!item) return;

            APP_STATE.modalCurrentItem = item;
            APP_STATE.modalSelectedSize = "medium";
            APP_STATE.modalSelectedCrust = "Original Pan";
            APP_STATE.modalQuantity = 1;

            document.getElementById('modal-item-name').innerText = item.name;
            document.getElementById('modal-item-img').src = item.img;
            document.getElementById('modal-item-desc').innerText = item.desc;

            const optionsContainer = document.getElementById('pizza-options-container');
            if(item.type === 'pizza') {
                const labels = item.sizeLabels || ["Small", "Medium", "Large"];
                optionsContainer.innerHTML = `
                    <div class="options-group">
                        <div class="options-group-title">Choose Crust Size</div>
                        <div class="selector-row">
                            <button class="selector-btn" id="btn-size-small" onclick="setModalSize('small')">${labels[0]}</button>
                            <button class="selector-btn active" id="btn-size-medium" onclick="setModalSize('medium')">${labels[1]}</button>
                            <button class="selector-btn" id="btn-size-large" onclick="setModalSize('large')">${labels[2]}</button>
                        </div>
                    </div>
                    ${!item.sizeLabels ? `
                    <div class="options-group">
                        <div class="options-group-title">Crust Style</div>
                        <div class="selector-row">
                            <button class="selector-btn active" id="btn-crust-pan" onclick="setModalCrust('Original Pan')">Original Pan</button>
                            <button class="selector-btn" id="btn-crust-crispy" onclick="setModalCrust('Thick & Crispy')">Thick & Crispy</button>
                            <button class="selector-btn" id="btn-crust-stuffed" onclick="setModalCrust('Cheese Stuffed')">Stuffed</button>
                        </div>
                    </div>
                    ` : ''}
                `;
            } else {
                optionsContainer.innerHTML = '';
            }

            updateModalPriceCalculations();
            document.getElementById('product-modal').style.display = 'flex';
        }

        function closeProductModal() {
            document.getElementById('product-modal').style.display = 'none';
        }

        function setModalSize(size) {
            APP_STATE.modalSelectedSize = size;
            document.querySelectorAll('[id^="btn-size-"]').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-size-${size}`).classList.add('active');
            updateModalPriceCalculations();
        }

        function setModalCrust(crust) {
            APP_STATE.modalSelectedCrust = crust;
            document.querySelectorAll('[id^="btn-crust-"]').forEach(btn => btn.classList.remove('active'));
            const identifier = crust === 'Original Pan' ? 'pan' : crust === 'Thick & Crispy' ? 'crispy' : 'stuffed';
            document.getElementById(`btn-crust-${identifier}`).classList.add('active');
            updateModalPriceCalculations();
        }

        function mutateModalQuantity(delta) {
            APP_STATE.modalQuantity = Math.max(1, APP_STATE.modalQuantity + delta);
            document.getElementById('modal-qty-display').innerText = APP_STATE.modalQuantity;
            updateModalPriceCalculations();
        }

        function calculateCurrentModalItemTotal() {
            const item = APP_STATE.modalCurrentItem;
            if(!item) return 0;
            
            let base = item.type === 'pizza' ? item.prices[APP_STATE.modalSelectedSize] : item.price;
            
            // Apply logic modifiers for Cheese Stuffed options
            if(item.type === 'pizza' && !item.sizeLabels && APP_STATE.modalSelectedCrust === 'Cheese Stuffed') {
                base += APP_STATE.modalSelectedSize === 'small' ? 150 : APP_STATE.modalSelectedSize === 'medium' ? 250 : 350;
            }
            return base * APP_STATE.modalQuantity;
        }

        function updateModalPriceCalculations() {
            document.getElementById('modal-total-price-display').innerText = calculateCurrentModalItemTotal();
        }

        // Global Tray/Cart Management arrays operations matrix
        function addModalItemToCart() {
            const item = APP_STATE.modalCurrentItem;
            const finalCalculatedUnit = calculateCurrentModalItemTotal() / APP_STATE.modalQuantity;
            
            const trayRecord = {
                id: item.id + '-' + Date.now(),
                name: item.name,
                img: item.img,
                type: item.type,
                size: item.type === 'pizza' ? APP_STATE.modalSelectedSize : null,
                crust: (item.type === 'pizza' && !item.sizeLabels) ? APP_STATE.modalSelectedCrust : null,
                unitPrice: finalCalculatedUnit,
                qty: APP_STATE.modalQuantity
            };

            APP_STATE.cart.push(trayRecord);
            updateGlobalBadgeCounterUI();
            closeProductModal();
            navigateTo('cart');
        }

        function updateGlobalBadgeCounterUI() {
            const totalCount = APP_STATE.cart.reduce((acc, current) => acc + current.qty, 0);
            const badge = document.getElementById('cart-badge-count');
            if(totalCount > 0) {
                badge.innerText = totalCount;
                badge.style.display = 'block';
            } else {
                badge.style.display = 'none';
            }
        }

        function mutateCartItemQty(recordId, delta) {
            const targetRecord = APP_STATE.cart.find(r => r.id === recordId);
            if(targetRecord) {
                targetRecord.qty += delta;
                if(targetRecord.qty <= 0) {
                    APP_STATE.cart = APP_STATE.cart.filter(r => r.id !== recordId);
                }
                updateGlobalBadgeCounterUI();
                renderCartUI();
            }
        }

        function renderCartUI() {
            const containerRoot = document.getElementById('cart-items-root');
            if(APP_STATE.cart.length === 0) {
                containerRoot.innerHTML = `<p style="text-align:center; padding:40px 0; color:var(--color-text-muted); font-size:13px;">Your dynamic tray is currently empty.</p>`;
                updateSummaryPricingDisplay(0);
                return;
            }

            let html = '';
            let combinedSubtotal = 0;

            APP_STATE.cart.forEach(record => {
                const compositeTotal = record.unitPrice * record.qty;
                combinedSubtotal += compositeTotal;
                
                const variantMeta = record.type === 'pizza' ? 
                    `<span class="cart-item-meta">${record.size.toUpperCase()} ${record.crust ? `• ${record.crust}` : ''}</span>` : '';

                html += `
                    <div class="cart-item">
                        <img src="${record.img}" alt="${record.name}">
                        <div class="cart-item-info">
                            <h4 class="cart-item-title">${record.name}</h4>
                            ${variantMeta}
                            <p class="cart-item-price">Br ${compositeTotal}</p>
                        </div>
                        <div class="qty-selector" style="padding:4px 8px; gap:10px;">
                            <button class="qty-btn" onclick="mutateCartItemQty('${record.id}', -1)">-</button>
                            <span style="font-size:12px; font-weight:700;">${record.qty}</span>
                            <button class="qty-btn" onclick="mutateCartItemQty('${record.id}', 1)">+</button>
                        </div>
                    </div>
                `;
            });

            containerRoot.innerHTML = html;
            updateSummaryPricingDisplay(combinedSubtotal);
        }

        function updateSummaryPricingDisplay(subtotal) {
            const standardServiceFee = subtotal > 0 ? 100 : 0; 
            const totalAccumulated = subtotal + standardServiceFee;
            
            document.getElementById('summary-subtotal').innerText = `Br ${subtotal}`;
            document.getElementById('summary-delivery').innerText = `Br ${standardServiceFee}`;
            document.getElementById('summary-total').innerText = `Br ${totalAccumulated}`;
        }

        // Telegram Action Payload string constructor assembler
        function submitOrderToTelegram() {
            if(APP_STATE.cart.length === 0) {
                alert("Please add items to your tray before checkout!");
                return;
            }
            
            const activeBranch = document.getElementById('branch-select').value;
            let textMessage = `🍕 *NEW PIZZA HUT ORDER* 🍕\n\n📍 *Branch:* ${activeBranch}\n\n*Items Ordered:*\n`;
            
            let grandTotal = 0;
            APP_STATE.cart.forEach(item => {
                const itemCost = item.unitPrice * item.qty;
                grandTotal += itemCost;
                const specifications = item.type === 'pizza' ? ` (${item.size}${item.crust ? `, ${item.crust}` : ''})` : '';
                textMessage += `• ${item.qty}x ${item.name}${specifications} - Br ${itemCost}\n`;
            });
            
            grandTotal += 100; // Add service fee
            textMessage += `\n💵 *Total Bill (Inc. Service Charge):* Br ${grandTotal}`;
            
            // Pass safely encoded structural parameters through standard browser intent links routing pipelines
            const targetUrl = `https://t.me/share/url?url=${encodeURIComponent(textMessage)}`;
            window.open(targetUrl, '_blank');
        }
    </script>
